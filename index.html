<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atestat Iași</title>
<link rel="stylesheet" href="css/index.css">
<link rel="icon" type="image/x-icon" href="img/Iasi.png">
<style>
.slideshow-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    animation: schimbaPoze 15s infinite;
    transition: background-image 0.5s ease-in-out;
}

@keyframes schimbaPoze {
    0%, 25%   { background-image: url('img/iasi1.jpg'); }
    33%, 58%  { background-image: url('img/iasi2.jpg'); }
    66%, 91%  { background-image: url('img/iasi3.jpg'); }
    100%      { background-image: url('img/iasi1.jpg'); }
}

</style>
</head>

<body>

<div class="slideshow-bg"></div>
<div class="background-overlay"></div>
<div class="container-titlu">
    <h1 class="titlu-principal">Iași</h1>
    <p class="subtitlu">Atestat realizat de: Ciobanu Rareș-Ionuț</p>
    <div class="grup-steaguri">
        <a href="ro/index" class="buton-steag">
            <img src="img/ro.svg" alt="Română">
        </a>
        <a href="en/index" class="buton-steag">
            <img src="img/en.svg" alt="English">
        </a>
    </div>
</div>

</body>

</html>
